name: Leads Hunter — Auto Run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-kaggle:
    runs-on: ubuntu-latest
    timeout-minutes: 600

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Setup Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{
            "username": "${{ secrets.KAGGLE_USERNAME }}",
            "key": "${{ secrets.KAGGLE_KEY }}"
          }' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Stop old session if running
        run: |
          echo "Checking kernel status..."
          STATUS=$(kaggle kernels status ${{ secrets.KAGGLE_USERNAME }}/leads-hunter 2>&1 || echo "not_found")
          echo "Status: $STATUS"
          if echo "$STATUS" | grep -q "running"; then
            echo "Running — stopping..."
            kaggle kernels cancel ${{ secrets.KAGGLE_USERNAME }}/leads-hunter
            sleep 60
          elif echo "$STATUS" | grep -q "queued"; then
            echo "Queued — cancelling..."
            kaggle kernels cancel ${{ secrets.KAGGLE_USERNAME }}/leads-hunter
            sleep 30
          else
            echo "No active session — pushing directly."
          fi

      - name: Prepare and push kernel
        run: |
          mkdir -p kaggle_push
          cp lead_agent.py kaggle_push/
          cp kernel-metadata.json kaggle_push/
          echo "Files ready:"
          ls -la kaggle_push/
          echo "Pushing..."
          kaggle kernels push -p kaggle_push/
          echo "Done."

      - name: Confirm kernel started
        run: |
          sleep 30
          kaggle kernels status ${{ secrets.KAGGLE_USERNAME }}/leads-hunter
