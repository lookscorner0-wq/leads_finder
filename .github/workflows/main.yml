name: Leads Hunter — Auto Run

on:
  push:
    branches: [main]
  workflow_dispatch:

# KEY FIX — only ONE workflow runs at a time
concurrency:
  group: leads-hunter
  cancel-in-progress: true

jobs:
  run-kaggle:
    runs-on: ubuntu-latest
    timeout-minutes: 600

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Setup Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{
            "username": "${{ secrets.KAGGLE_USERNAME }}",
            "key": "${{ secrets.KAGGLE_KEY }}"
          }' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Stop old Kaggle session if running
        run: |
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/leads-hunter"
          STATUS=$(kaggle kernels status $KERNEL 2>&1 || echo "not_found")
          echo "Status: $STATUS"
          if echo "$STATUS" | grep -qE "running|queued"; then
            echo "Stopping old session..."
            kaggle kernels cancel $KERNEL || true
            sleep 60
          else
            echo "No active session."
          fi

      - name: Prepare and push kernel
        run: |
          mkdir -p kaggle_push
          cp lead_agent.py kaggle_push/
          cp kernel-metadata.json kaggle_push/
          kaggle kernels push -p kaggle_push/
          echo "Pushed successfully."

      - name: Confirm started
        run: |
          sleep 30
          kaggle kernels status ${{ secrets.KAGGLE_USERNAME }}/leads-hunter
